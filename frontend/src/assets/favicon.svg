    <rect x="-80" y="-40" width="160" height="80" rx="10" fill="#1a1f3a" stroke="#1e90ff" stroke-width="8"/>
    <polygon points="-30,-20 30,-20 0,20" fill="#00ff88"/>
  </g>
</svg>